# fly.toml — TShock Terraria Server
# Docs: https://fly.io/docs/reference/configuration/

app = "terraria-flyio"
primary_region = "sin"

[build]

# ─── Single persistent volume holds config, worlds, plugins, player data
[[mounts]]
  source      = "terraria_data"
  destination = "/data"
  initial_size = "5gb"

# ─── Game port: raw TCP, no TLS proxy (Terraria's protocol is binary)
[[services]]
  internal_port = 7777
  protocol      = "tcp"
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [services.concurrency]
    type        = "connections"
    hard_limit  = 32
    soft_limit  = 16

  [[services.ports]]
    port     = 7777
    handlers = []

  [[services.tcp_checks]]
    interval      = "15s"
    timeout       = "5s"
    grace_period  = "120s"   # World generation can take a minute+

# ─── Machine size: TShock + medium world ≈ 1GB RAM is comfy
[[vm]]
  size        = "shared-cpu-2x"
  memory      = "1gb"
  cpu_kind    = "shared"
  cpus        = 2

[deploy]
  strategy = "immediate"   # No rolling — only one server can hold the world
