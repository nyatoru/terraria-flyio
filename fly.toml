# fly.toml — TShock Terraria Server
# Docs: https://fly.io/docs/reference/configuration/
#
# Access policy:
#   - Game traffic ONLY (raw TCP/7777)
#   - No HTTP/HTTPS — *.fly.dev cannot reach this server
#   - Connect via the dedicated IPv4 from `fly ips list`

app = "terraria-flyio"
primary_region = "sin"

[build]

# ─── Single persistent volume holds config, worlds, plugins, player data
# Create the volume BEFORE first deploy:
#   fly volume create terraria_data --region sin --size 5 --snapshot-retention 5
# Daily snapshots are kept 5 days (Fly free tier) — restorable if volume corrupts.
[[mounts]]
  source                  = "terraria_data"
  destination             = "/data"
  initial_size            = "5gb"
  snapshot_retention      = 5     # days
  auto_extend_size_threshold = 80  # % full → auto-grow
  auto_extend_size_increment = "1GB"
  auto_extend_size_limit     = "20GB"

# ─── Game port: raw TCP, no TLS proxy (Terraria's protocol is binary)
# NOTE: auto_stop is DISABLED for Terraria — stop/start cycles cause
# [PP02] broken pipe errors because the client times out while Fly is
# booting the machine back up. Keep min_machines_running = 1.
[[services]]
  internal_port = 7777
  protocol      = "tcp"
  auto_stop_machines  = "off"
  auto_start_machines = false
  min_machines_running = 1

  [services.concurrency]
    type        = "connections"
    hard_limit  = 32
    soft_limit  = 16

  [[services.ports]]
    port     = 7777
    handlers = []

  # TCP health checks are DISABLED.
  # Reason: each probe opens a TCP connection that TShock interprets as a
  # "client connecting" event, triggering a world save + backup every 15-60s.
  # The probes flood the world file with backups (.bak1/.bak2) and add disk I/O.
  # Fly will still detect a dead machine via the process exit code — if
  # TShock crashes, the container exits and Fly restarts it.
  #
  # If you want process-level health monitoring, configure a TShock REST API
  # health endpoint and use [[services.http_checks]] on port 7878 instead
  # (REST API doesn't trigger Terraria's save-on-connect behavior).

# ─── Machine size: performance-2x = 2 dedicated vCPU + 4GB RAM
# Ideal for medium/large worlds with 8-16 players + plugins
[[vm]]
  size = "performance-2x"

[env]
  WORLD_NAME = "legendary2"
  SEED = "for the worthy"
  DIFFICULTY = "2"

[deploy]
  # Stateful single-instance app — only one machine can hold the world lock.
  # 'immediate' kills the old machine and starts a new one (1-3 min downtime
  # during world reload). Cannot use rolling/bluegreen (volume + world file
  # are exclusive to one machine).
  strategy = "immediate"
  wait_timeout = "5m"   # Allow time for world to load on the new machine
